services:
  postgres:
    image: postgres:16-alpine
    container_name: applypilot-postgres
    environment:
      POSTGRES_DB: applypilot
      POSTGRES_USER: applypilot
      POSTGRES_PASSWORD: applypilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applypilot -d applypilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: applypilot-backend
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://applypilot:applypilot@postgres:5432/applypilot
      SECRET_KEY: change-me-in-development
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: applypilot-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
